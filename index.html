<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary In Use - Mục Lục</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .search-highlight {
            background-color: #fef08a;
            border-radius: 2px;
        }

        /* ── Compact navbar ── */
        #siteNavbar {
            background: rgba(0,0,0,0.18);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.12);
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.80);
            background: transparent;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            position: relative;
        }
        .nav-btn:hover, .nav-btn.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .nav-btn svg.chevron {
            transition: transform 0.2s;
        }
        .nav-btn.open svg.chevron {
            transform: rotate(180deg);
        }

        /* Dropdown */
        .nav-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 220px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
            padding: 6px;
            z-index: 999;
            display: none;
            animation: dropIn 0.18s ease;
        }
        .nav-dropdown.open { display: block; }
        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .nav-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            transition: background 0.13s, color 0.13s;
        }
        .nav-dropdown a:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        .nav-dropdown a.active {
            background: rgba(99,102,241,0.35);
            color: #fff;
            font-weight: 600;
        }
        .nav-dropdown .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 4px 0;
        }
        .nav-dropdown .book-level-badge {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 99px;
            font-weight: 600;
            background: rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.55);
            margin-left: auto;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 min-h-screen">

    <!-- ── Compact navbar ── -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg">
        <nav id="siteNavbar" class="flex items-center gap-1 px-6 py-2" aria-label="Điều hướng chính">

            <!-- Books dropdown -->
            <div class="relative" id="booksMenuWrapper">
                <button id="booksMenuBtn" class="nav-btn" aria-haspopup="true" aria-expanded="false" aria-controls="booksDropdown">
                    <span>📚</span>
                    <span id="booksMenuLabel">Sách</span>
                    <svg class="chevron h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="booksDropdown" class="nav-dropdown" role="menu">
                    <!-- Injected by JS -->
                </div>
            </div>

            <!-- Quiz Stories link -->
            <a href="quiz-stories.html" class="nav-btn" id="nav-quiz-stories">
                <span>🎯</span>
                <span>Quiz Stories</span>
            </a>

            <!-- Quiz Passage link -->
            <a href="quiz-passage.html" class="nav-btn" id="nav-quiz-passage">
                <span>📖</span>
                <span>Quiz Passage</span>
            </a>

            <!-- Typing Passage link -->
            <a href="typing-passage.html" class="nav-btn" id="nav-typing-passage">
                <span>✍️</span>
                <span>Viết Passage</span>
            </a>

            <!-- Typing Stories link -->
            <a href="typing-stories.html" class="nav-btn" id="nav-typing-stories">
                <span>✍️</span>
                <span>Viết Stories</span>
            </a>

            <!-- Vocabulary links -->
            <a href="quiz-vocabulary.html" class="nav-btn" id="nav-quiz-vocabulary">
                <span>🎯</span>
                <span>Quiz Vocabulary</span>
            </a>

            <a href="typing-vocabulary.html" class="nav-btn" id="nav-typing-vocabulary">
                <span>✍️</span>
                <span>Viết Vocabulary</span>
            </a>

            <!-- Spacer for future menu items -->
            <div class="flex-1"></div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-6 py-10">

        <!-- Stats bar -->
        <div class="flex items-center justify-between mb-6">
            <p class="text-gray-500 text-sm" id="countLabel"></p>
            <span class="text-xs text-gray-400 bg-white border border-gray-200 rounded-full px-3 py-1 shadow-sm">
                English Vocabulary In Use
            </span>
        </div>

        <!-- Unit Grid (vocabulary) -->
        <div id="unitGrid" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>

        <!-- Writing section -->
        <div id="writingSection" class="hidden mt-10">
            <div class="flex items-center gap-3 mb-5">
                <span class="text-2xl">✍️</span>
                <h2 class="text-lg font-bold text-gray-700">Bài tập viết</h2>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>
            <div id="writingGrid" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden text-center py-20 text-gray-400">
            <div class="text-5xl mb-4">🔍</div>
            <p class="text-lg font-medium">Không tìm thấy unit nào</p>
            <p class="text-sm mt-1">Thử tìm với từ khóa khác</p>
        </div>
    </main>

    <footer class="text-center text-xs text-gray-400 pb-8">
        © 2026 English Vocabulary In Use &mdash; Luyện tập từ vựng tiếng Anh
    </footer>

    <script>
        const urlParams = new URLSearchParams(location.search);
        const bookId = urlParams.get('book'); // e.g. "book_01" or null

        let items = []; // books or units depending on view
        let allBooks = []; // global list of books loaded from manifest

        const grid           = document.getElementById('unitGrid');
        const writingSection = document.getElementById('writingSection');
        const writingGrid    = document.getElementById('writingGrid');
        const emptyState     = document.getElementById('emptyState');
        const countLabel     = document.getElementById('countLabel');
        // ── Books dropdown menu ─────────────────────────────────────────────
        const booksMenuBtn    = document.getElementById('booksMenuBtn');
        const booksDropdown   = document.getElementById('booksDropdown');
        const booksMenuLabel  = document.getElementById('booksMenuLabel');

        function buildBookMenu(books, activeBookId) {
            booksDropdown.innerHTML = '';

            // "Tất cả sách" row at top of dropdown
            const allRow = document.createElement('a');
            allRow.href = 'index.html';
            allRow.className = !activeBookId ? 'active' : '';
            allRow.setAttribute('role', 'menuitem');
            allRow.innerHTML = `<span>🏠</span><span>Tất cả sách</span>`;
            booksDropdown.appendChild(allRow);

            // Divider
            const divider = document.createElement('div');
            divider.className = 'divider';
            booksDropdown.appendChild(divider);

            // One row per book
            books.forEach(book => {
                const shortLabel = book.title.replace(/^English Vocabulary In Use\s*[-–]\s*/i, '');
                const row = document.createElement('a');
                row.href = `index.html?book=${encodeURIComponent(book.id)}`;
                row.className = activeBookId === book.id ? 'active' : '';
                row.setAttribute('role', 'menuitem');
                row.id = `drop-${book.id}`;
                row.innerHTML = `<span>${book.icon}</span><span>${shortLabel}</span><span class="book-level-badge">${book.id.replace('book_0','B')}</span>`;
                booksDropdown.appendChild(row);
            });

            // Update button label when inside a book
            if (activeBookId) {
                const activeMeta = books.find(b => b.id === activeBookId);
                if (activeMeta) {
                    const short = activeMeta.title.replace(/^English Vocabulary In Use\s*[-–]\s*/i, '');
                    booksMenuLabel.textContent = short;
                    booksMenuBtn.classList.add('active');
                }
            }

        }

        // Toggle dropdown
        booksMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = booksDropdown.classList.toggle('open');
            booksMenuBtn.classList.toggle('open', isOpen);
            booksMenuBtn.setAttribute('aria-expanded', isOpen);
        });

        // Close on outside click
        document.addEventListener('click', () => {
            booksDropdown.classList.remove('open');
            booksMenuBtn.classList.remove('open');
            booksMenuBtn.setAttribute('aria-expanded', 'false');
        });

        // ── Book card ───────────────────────────────────────────────────────
        function renderBookCard(book, idx) {
            const card = document.createElement('a');
            card.href = `index.html?book=${encodeURIComponent(book.id)}`;
            card.className = 'card-hover fade-in block bg-white rounded-2xl shadow-md overflow-hidden cursor-pointer group';
            card.style.animationDelay = `${idx * 60}ms`;
            card.setAttribute('aria-label', book.title);
            card.innerHTML = `
                <div class="bg-gradient-to-br ${book.color} p-5 flex items-center justify-between">
                    <div>
                        <span class="text-white text-xs font-semibold uppercase tracking-widest opacity-80">${book.id.replace('_', ' ').toUpperCase()}</span>
                        <div class="text-3xl mt-1">${book.icon}</div>
                    </div>
                </div>
                <div class="p-5">
                    <h2 class="text-gray-800 font-bold text-base leading-snug group-hover:text-blue-600 transition-colors">${book.title}</h2>
                    <p class="text-gray-400 text-sm mt-1">${book.titleVi}</p>
                    <div class="mt-4 flex items-center text-blue-500 text-xs font-semibold">
                        Xem các unit
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </div>
                </div>
            `;
            return card;
        }

        // ── Unit card ───────────────────────────────────────────────────────
        function renderUnitCard(unit, idx) {
            const card = document.createElement('a');
            const isWriting = unit.type === 'writing';
            card.href = isWriting
                ? `writing-exam.html?file=${encodeURIComponent(bookId + '/' + unit.file)}&book=${encodeURIComponent(bookId)}`
                : `exercise.html?file=${encodeURIComponent(bookId + '/' + unit.file)}&book=${encodeURIComponent(bookId)}`;
            card.className = 'card-hover fade-in block bg-white rounded-2xl shadow-md overflow-hidden cursor-pointer group';
            card.style.animationDelay = `${idx * 60}ms`;
            card.setAttribute('aria-label', `Unit ${unit.unit}: ${unit.title}`);
            card.innerHTML = `
                <div class="bg-gradient-to-br ${unit.color} p-5 flex items-center justify-between">
                    <div>
                        <span class="text-white text-xs font-semibold uppercase tracking-widest opacity-80">Unit ${unit.unit}</span>
                        <div class="text-3xl mt-1">${unit.icon}</div>
                    </div>
                    <span class="bg-white bg-opacity-20 text-white text-xs font-medium px-2 py-1 rounded-full">${unit.topic || ''}</span>
                </div>
                <div class="p-5">
                    <h2 class="text-gray-800 font-bold text-base leading-snug group-hover:text-blue-600 transition-colors">${unit.title}</h2>
                    <p class="text-gray-400 text-sm mt-1">${unit.titleVi || ''}</p>
                    <div class="mt-4 flex items-center text-blue-500 text-xs font-semibold">
                        ${isWriting ? 'Luyện tập viết' : 'Bắt đầu luyện tập'}
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </div>
                </div>
            `;
            return card;
        }

        // ── Render list ─────────────────────────────────────────────────────
        function render(list) {
            grid.innerHTML = '';
            writingGrid.innerHTML = '';
            writingSection.classList.add('hidden');

            const label = bookId ? 'unit' : 'sách';
            countLabel.textContent = `Hiển thị ${list.length} / ${items.length} ${label}`;

            if (list.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            if (bookId) {
                // Split vocabulary vs writing
                const vocabItems   = list.filter(u => u.type !== 'writing');
                const writingItems = list.filter(u => u.type === 'writing');

                vocabItems.forEach((item, idx) => grid.appendChild(renderUnitCard(item, idx)));

                if (writingItems.length > 0) {
                    writingSection.classList.remove('hidden');
                    writingItems.forEach((item, idx) => writingGrid.appendChild(renderUnitCard(item, idx)));
                }
            } else {
                list.forEach((item, idx) => grid.appendChild(renderBookCard(item, idx)));
            }
        }

        // ── Filter ──────────────────────────────────────────────────────────
        function filter(query) {
            const q = query.toLowerCase().trim();
            if (!q) return items;
            if (bookId) {
                return items.filter(u =>
                    u.title.toLowerCase().includes(q) ||
                    (u.titleVi || '').toLowerCase().includes(q) ||
                    (u.topic || '').toLowerCase().includes(q) ||
                    String(u.unit).includes(q)
                );
            }
            return items.filter(b =>
                b.title.toLowerCase().includes(q) ||
                b.titleVi.toLowerCase().includes(q) ||
                b.id.toLowerCase().includes(q)
            );
        }



        // ── Init ────────────────────────────────────────────────────────────
        async function init() {
            // Always load the global book list first (for the menu)
            try {
                const booksRes = await fetch('data/manifest.json');
                allBooks = booksRes.ok ? await booksRes.json() : [];
            } catch (_) { allBooks = []; }

            // Build the dropdown menu
            buildBookMenu(allBooks, bookId);

            if (bookId) {
                // ── Unit view ──
                try {
                    const res = await fetch(`data/${bookId}/manifest.json`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    items = await res.json();
                    render(items);
                } catch (err) {
                    console.error('Không thể tải danh sách unit:', err);
                    countLabel.textContent = 'Lỗi tải danh sách unit.';
                    emptyState.classList.remove('hidden');
                }
            } else {
                // ── Book view ──
                items = allBooks;
                render(items);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
